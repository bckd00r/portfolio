title: About Me
description: Self-taught software developer specializing in low-level systems, modern web platforms, and practical problem-solving.
content: |
  I am **Mustafa Barış Göktepe**, a self-taught software developer who originally graduated from a vocational high school with a specialization in electrical-electronics (panel branch). My path wasn't traditional, and that's precisely what gives me a unique perspective on engineering and problem-solving.

  ### Engineering & Development
  I spent a year in England receiving professional English education before returning to Turkey. I've successfully worked as a Senior Developer at **TecSense**, managing a year-long contract and delivering complex technical solutions. My work spans across deep systems-level programming, rendering, and modern web platforms for various influencers and businesses.

  ### Web Platforms & Architecture
  I build scalable, modern web applications. Managing the entire lifecycle—from the initial design and client negotiation to deploying a flawless Nuxt.js/Vue.js application—I focus on writing clean, maintainable, and high-performance code.

  ### Business & E-Commerce
  Code without a business model is just syntax. I've successfully managed independent e-commerce operations on platforms like **Trendyol**, handling supply chains, product optimization, and customer relations. This practical business experience allows me to see software not just as code, but as a product that must solve real problems.

  ### Beyond the Screen
  Discipline extends beyond the keyboard. I am deeply passionate about sports, focusing on **bodybuilding, running, and competing in amateur marathons**. Spending time in tourism hubs like Antalya has also helped me embrace commerce and people, broadening my worldview through genuine connection and communication.

  My technical journey is fueled by a hands-on approach: disciplined, resilient, and endlessly curious.
