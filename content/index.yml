faq:
  title: Frequently Asked Questions
  description: Common questions about my work, process, and availability.
  categories:
    - title: Services
      questions:
        - label: What kind of projects do you take on?
          content: |
            I work across three domains — systems-level engineering (C++, DirectX, game engine internals), web development (modern platforms with Nuxt.js/Vue.js for brands and influencers), and business technology consulting. Whether you need a custom renderer, a production web platform, or strategic technical guidance, I can help.
        - label: How do you approach a new project?
          content: |
            I start by deeply understanding the problem space and business context. Then I architect a solution that balances technical excellence with practical delivery. I believe in clear communication, iterative progress, and delivering quality that exceeds expectations.
        - label: Do you work with international clients?
          content: |
            Yes. I've worked with clients and companies across different markets. I'm comfortable with remote collaboration, meetings across time zones, and adapting to different business cultures.
    - title: Technical
      questions:
        - label: What's your strongest technical area?
          content: |
            My deepest expertise is in C++ systems programming — DirectX rendering, memory management, reverse engineering, and building tools that interact with complex software at a low level. But I'm equally capable of shipping production web applications.
        - label: Can you build custom web platforms?
          content: |
            Absolutely. I've built web platforms for multiple influencers including Aphernix and Smyra, handling everything from design to deployment. I primarily use Nuxt.js with modern tooling.
    - title: Availability
      questions:
        - label: Are you available for freelance work?
          content: |
            Yes, I'm currently open to new projects. Whether it's a focused technical engagement or ongoing consulting, feel free to reach out and we can discuss your needs.
        - label: How can I contact you?
          content: |
            The best way to reach me is via email. You can also find me on GitHub and Discord through the links in the footer.
